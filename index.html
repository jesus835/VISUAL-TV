r-cta{margin-top:26px}.center-cta .subscribe-btn{min-width:300px}.discover-title{margin-top:64px;font-size:1.85rem}.category-strip{margin-top:28px;font-size:1.7rem;padding:0 14px}.category-strip .arrow{font-size:3rem}.poster-rail{margin-top:22px;grid-auto-columns:calc(25% - 9px);gap:16px;padding-bottom:40px;justify-content:center}.poster-rail img,.poster-rail .ph{height:168px}}

    @media (min-width:1200px) and (max-width:1599px){.hero{min-height:840px;padding:138px 48px 60px}.hero-content{max-width:860px;transform:translateY(-114px) scale(.68)}.hero-logo img{width:min(42vw,540px)}.hero-copy{font-size:3rem}.hero-price strong{font-size:5rem}.plans{gap:22px}.dual-rail{grid-auto-columns:250px}.grid-posters{grid-template-columns:repeat(3,minmax(0,1fr))}.poster-rail{grid-auto-columns:calc(25% - 12px)}}
    @media (min-width:1600px){.topbar{padding:18px 34px}.brand-small img{height:40px}.subscribe-btn{min-width:168px;padding:17px 26px;font-size:1rem}.hero{min-height:960px;padding:154px 72px 74px}.hero-collage{gap:4px}.hero-content{max-width:1040px;transform:translateY(-134px) scale(.76)}.hero-logo img{width:min(38vw,620px)}.hero-copy{font-size:3.55rem}.hero-price strong{font-size:5.8rem}.hero-cta .subscribe-btn{min-width:340px;padding:20px 24px;font-size:1.1rem}.section{padding:40px 42px 0}.section.spacious{padding-top:72px}.section-title{font-size:2.9rem}.tabs-row{gap:54px}.tab-btn{font-size:2.15rem}.plans{max-width:1400px;margin:32px auto 0;gap:28px}.plan-card{padding:42px 38px 34px;min-height:450px}.dual-rail{grid-auto-columns:290px;gap:20px}.grid-posters{max-width:1400px;margin:34px auto 0;grid-template-columns:repeat(4,minmax(0,1fr));gap:20px}.grid-posters img,.grid-posters .ph{height:200px}.center-cta .subscribe-btn{min-width:320px}.discover-title{margin-top:72px;font-size:2rem}.category-strip{max-width:1400px;margin:32px auto 0;font-size:1.8rem}.poster-rail{max-width:1400px;margin:24px auto 0;grid-auto-columns:calc(20% - 13px);gap:18px}.poster-rail img,.poster-rail .ph{height:176px}}
    @media (min-width:900px) and (max-height:760px){.hero{min-height:680px;padding-top:96px}.hero-content{transform:translateY(-132px) scale(.58)}}
    @media (min-width:900px) and (max-width:1366px) and (max-height:800px){.hero{min-height:700px;padding-top:100px}.hero-content{transform:translateY(-140px) scale(.58)}.hero-logo img{width:min(46vw,470px)}.hero-copy{font-size:2.45rem}.hero-price strong{font-size:3.9rem}.hero-cta{margin-top:22px}.hero-cta .subscribe-btn{min-width:260px;padding:15px 18px;font-size:.98rem}}

<body>
  <div class="app">
    <header class="topbar">
      <div class="top-left">
        <button class="menu-btn" aria-label="Menu"><span class="menu-lines"><span></span><span></span><span></span></span></button>
        <div class="brand-small" aria-label="Logo"><img src="https://i.imgur.com/cLjFIqH.png" alt="Logo" /></div>
      </div>
      <button class="subscribe-btn">SUSCRIBETE</button>
    </header>

    <section class="hero">
      <div class="hero-collage" id="heroCollage"></div>
      <div class="hero-content">
        <div class="hero-logo"><img src="https://i.imgur.com/cLjFIqH.png" alt="Logo principal" /></div>
        <p class="hero-copy" id="heroCopy">Los planes empiezan desde</p>
        <p class="hero-price"><strong id="heroPrice">USD 50.00/mes</strong></p>
        <div class="hero-cta"><button class="subscribe-btn">SUSCRIBETE AHORA</button></div>
      </div>
    </section>

    <section class="section spacious">
      <h2 class="section-title">ELIGE EL MEJOR PLAN PARA TI</h2>
      <div class="tabs-row" id="planTabs">
        <button class="tab-btn active" data-plan-mode="annual">Anual En Cuotas <span class="badge">Ahorra 30%</span></button>
        <button class="tab-btn" data-plan-mode="monthly">Mensual</button>
      </div>
      <div class="plans" id="plans"></div>
    </section>

    <section class="section spacious">
      <div class="dual-rail" id="familyRail"></div>
    </section>

    <section class="section spacious">
      <h2 class="section-title">Estrenos de los que no pararas de hablar</h2>
      <div class="grid-posters" id="featuredGrid"></div>
      <div class="center-cta"><button class="subscribe-btn">SUSCRIBETE AHORA</button></div>
      <h3 class="discover-title">DESCUBRE LO MEJOR EN</h3>
      <div class="category-strip">
        <span class="arrow">&lt;</span>
        <div class="center-labels" id="discoverLabels"><span>Drama</span><span>Crimen</span><span>Accion</span></div>
        <span class="arrow">&gt;</span>
      </div>
      <div class="poster-rail" id="discoverRail"></div>
    </section>
  </div>

  <script>
    const BASE="https://la.movie",PRICE="USD 50.00/mes";
    const planData={annual:[{title:"Basico con anuncios",price:"USD 35.00",total:"Precio total anual USD 420.00",features:["2 dispositivos a la vez","Resolucion Full HD"]},{title:"Estandar",price:"USD 49.00",total:"Precio total anual USD 588.00",features:["2 dispositivos a la vez","Resolucion Full HD","30 descargas para disfrutar offline"]}],monthly:[{title:"Basico con anuncios",price:"USD 50.00",total:"Facturacion mensual sin permanencia",features:["2 dispositivos a la vez","Resolucion Full HD"]},{title:"Estandar",price:"USD 70.00",total:"Facturacion mensual sin permanencia",features:["2 dispositivos a la vez","Resolucion Full HD","30 descargas para disfrutar offline"]}]};
    const plansNode=document.getElementById("plans"),planTabs=[...document.querySelectorAll("[data-plan-mode]")],heroCollage=document.getElementById("heroCollage"),heroCopy=document.getElementById("heroCopy"),heroPrice=document.getElementById("heroPrice"),familyRail=document.getElementById("familyRail"),featuredGrid=document.getElementById("featuredGrid"),discoverLabels=document.getElementById("discoverLabels"),discoverRail=document.getElementById("discoverRail");
    const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    const decode=s=>{const t=document.createElement("textarea");t.innerHTML=String(s||"");return t.value};
    const cleanTitle=s=>decode(String(s||"Sin titulo")).replace(/\s*\((19|20)\d{2}\)\s*$/i,"").trim();
    const overview=i=>decode(String(i&&i.overview||"")).trim();
    function planHtml(mode){plansNode.innerHTML=planData[mode].map(p=>`<article class="plan-card"><h3>${p.title}</h3><div class="plan-price-row">12x <strong>${p.price}</strong>/mes</div><div class="plan-total">${p.total}</div><ul class="plan-list">${p.features.map(f=>`<li>${f}</li>`).join("")}</ul><button class="subscribe-btn">SELECCIONAR PLAN</button></article>`).join("")}
    function status(msg){}
    function posterUrl(path,w=500){const c=String(path||"").trim(),l=c.toLowerCase();if(!c)return null;if(l.startsWith("https://image.tmdb.org/")&&(c.includes("/thumbs/")||c.includes("/backdrops/")||c.includes("/logos/"))){const org=l.indexOf(".org/"),ps=org>=0?c.indexOf("/",org+5):-1,np=ps>=0?c.substring(ps):c;return`https://la.movie/wp-content/uploads${np}`}if(/^https?:\/\//i.test(c))return c;if(c.startsWith("/thumbs/")||c.startsWith("/backdrops/")||c.startsWith("/logos/"))return`https://la.movie/wp-content/uploads${c}`;return`https://image.tmdb.org/t/p/w${w}${c.startsWith("/")?c:`/${c}`}`}
    const listingUrl=(type,page)=>`${BASE}/wp-api/v1/listing/${encodeURIComponent(type)}?${new URLSearchParams({filter:"{}",page:String(page),orderBy:"latest",order:"DESC",postType:type,postsPerPage:"12"})}`;
    const slidersUrl=(postType="any",page=1,postsPerPage=10)=>`${BASE}/wp-api/v1/sliders?${new URLSearchParams({page:String(page),postType,postsPerPage:String(postsPerPage)})}`;
    function withTimeout(promise,ms,label){let timer=null;const timeout=new Promise((_,reject)=>{timer=setTimeout(()=>reject(new Error(`${label} timeout`)),ms)});return Promise.race([promise,timeout]).finally(()=>clearTimeout(timer))}
    function parseData(text){const json=JSON.parse(text);if(json.error)throw new Error(json.message||"La.Movie error");return json.data}
    async function fetchData(url){const attempts=[{label:"directo",url,mode:"text"},{label:"allorigins-raw",url:`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,mode:"text"},{label:"codetabs",url:`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,mode:"text"},{label:"allorigins-get",url:`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,mode:"json"}],tasks=attempts.map(a=>(async()=>{const res=await withTimeout(fetch(a.url,{headers:{Accept:"application/json"}}),5000,`La.Movie ${a.label}`);if(!res.ok)throw new Error(`${a.label} HTTP ${res.status}`);const text=a.mode==="json"?((await res.json()).contents||""):await res.text();if(!text||typeof text!=="string")throw new Error(`${a.label} vacio`);return parseData(text)})());try{return await Promise.any(tasks)}catch(e){throw new Error("No se pudo cargar La.Movie")}}
    const fetchListing=(type,page=1)=>fetchData(listingUrl(type,page)),fetchSliders=(type="any",page=1,count=12)=>fetchData(slidersUrl(type,page,count));
    function unique(items){const seen=new Set();return(items||[]).filter(i=>{const id=i&&i._id!=null?String(i._id):JSON.stringify(i);if(seen.has(id))return false;seen.add(id);return true})}
    function interleave(movies,series,limit=24){const out=[],max=Math.max(movies.length,series.length);for(let i=0;i<max&&out.length<limit;i+=1){if(movies[i])out.push(movies[i]);if(series[i]&&out.length<limit)out.push(series[i])}return out}
    const itemImage=(i,w=780)=>posterUrl(i&&i.images&&i.images.backdrop,w)||posterUrl(i&&i.images&&i.images.poster,w);
    const itemPoster=(i,w=500)=>posterUrl(i&&i.images&&i.images.poster,w)||posterUrl(i&&i.images&&i.images.backdrop,w);
    function cats(item){const raw=item&&(item.categories||item.genres||item.category)||[],vals=Array.isArray(raw)?raw:[raw];return vals.map(v=>!v?"":typeof v==="string"?decode(v).trim():decode(v.name||v.title||v.label||"").trim()).filter(Boolean)}
    function typeLabel(item){const t=String(item&&item.type||"").toLowerCase();if(t==="tvshows")return"SERIES";if(t==="animes")return"ANIME";return"PELICULAS"}
    const featureLabel=item=>(cats(item)[0]||typeLabel(item)||"DESTACADO").toUpperCase();
    const isMobile=()=>window.matchMedia("(max-width: 899px)").matches;
    const isWideDesktop=()=>window.matchMedia("(min-width: 1600px)").matches;
    const featureCount=()=>isMobile()?5:(isWideDesktop()?6:5);
    const discoverCount=()=>isMobile()?4:(isWideDesktop()?7:6);
function placeholders(){heroCollage.innerHTML=new Array(18).fill('<div class="ph"></div>').join("");familyRail.innerHTML=new Array(featureCount()).fill('<article class="feature-card"><div class="ph"></div></article>').join("");featuredGrid.innerHTML=new Array(isMobile()?8:6).fill('<div class="ph"></div>').join("");discoverRail.innerHTML=new Array(discoverCount()).fill('<div class="ph"></div>').join("")}
    function renderHero(items){const targetCount=isMobile()?20:18,filled=takeLoop(items,targetCount);heroCollage.innerHTML=filled.map((i,idx)=>{const src=itemImage(i,780);return src?`<img src="${esc(src)}" alt="${esc(cleanTitle(i.title))}" loading="${idx<6?"eager":"lazy"}" fetchpriority="${idx<4?"high":"auto"}" />`:'<div class="ph"></div>'}).join("")}
function renderRail(node,items,variant){node.innerHTML=items.map((i,idx)=>{const src=variant==="feature"?itemPoster(i,500):itemImage(i,780);if(variant==="feature"){return`<article class="feature-card">${src?`<img src="${esc(src)}" alt="${esc(cleanTitle(i.title))}" loading="${idx===0?"eager":"lazy"}" fetchpriority="${idx===0?"high":"auto"}" />`:'<div class="ph"></div>'}</article>`}return src?`<img src="${esc(src)}" alt="${esc(cleanTitle(i.title))}" loading="${idx<2?"eager":"lazy"}" fetchpriority="${idx===0?"high":"auto"}" />`:'<div class="ph"></div>'}).join("")}
    function renderLabels(items){const labels=[];items.forEach(i=>cats(i).forEach(c=>{if(c&&!labels.includes(c))labels.push(c)}));const chosen=labels.slice(0,3);if(!chosen.length)chosen.push("Drama","Crimen","Accion");discoverLabels.innerHTML=chosen.map(l=>`<span>${esc(l)}</span>`).join("")}
    function applyHero(item){if(!item)return;heroCopy.textContent="Los planes empiezan desde";heroPrice.textContent=PRICE}
    function takeLoop(items,count){const pool=(items||[]).filter(Boolean);if(!pool.length)return[];const out=[];for(let i=0;i<count;i+=1)out.push(pool[i%pool.length]);return out}
    function renderFromItems(items,featured){const clean=unique(items).filter(i=>itemImage(i,780));if(!clean.length)throw new Error("La.Movie sin imagenes renderizables");const gridCount=isMobile()?8:6,currentFeatureCount=featureCount(),currentDiscoverCount=discoverCount(),heroItems=clean.slice(0,18),featureItems=takeLoop(clean.slice(0,currentFeatureCount),currentFeatureCount),gridPool=clean.slice(currentFeatureCount).length?clean.slice(currentFeatureCount):clean,gridItems=takeLoop(gridPool,gridCount),discoverSourceIndex=currentFeatureCount+gridCount,discoverPool=clean.slice(discoverSourceIndex).length?clean.slice(discoverSourceIndex):clean.slice(0,currentDiscoverCount),disc=takeLoop(discoverPool,currentDiscoverCount);renderHero(heroItems);applyHero(featured||clean[0]);renderRail(familyRail,featureItems,"feature");renderRail(featuredGrid,gridItems,"grid");renderRail(discoverRail,disc,"grid");renderLabels(disc)}
    async function loadCatalog(){status("Cargando la.movie...");const sliderData=await fetchSliders("any",1,18),sliders=(sliderData&&sliderData.posts)||[];if(sliders.length){renderFromItems(sliders,sliders[0]);status("Catalogo cargado desde la.movie");return}const [mr,tr]=await Promise.allSettled([fetchListing("movies",1),fetchListing("tvshows",1)]),movies=mr.status==="fulfilled"?(mr.value&&mr.value.posts)||[]:[],series=tr.status==="fulfilled"?(tr.value&&tr.value.posts)||[]:[];if(!movies.length&&!series.length)throw new Error("La.Movie: sin contenido");const merged=interleave(movies,series,30);renderFromItems(merged,merged[0]);status("Catalogo cargado desde la.movie")}
    function fallback(error){heroCollage.innerHTML="";heroCopy.textContent="No se pudo cargar la.movie en este momento.";heroPrice.textContent=PRICE;familyRail.innerHTML='<article class="feature-card"><div class="ph"></div></article>';featuredGrid.innerHTML="";discoverRail.innerHTML="";status(error&&error.message?error.message:"Fallo la carga del catalogo")}
    planTabs.forEach(tab=>tab.addEventListener("click",()=>{planTabs.forEach(b=>b.classList.remove("active"));tab.classList.add("active");planHtml(tab.dataset.planMode)}));
    planHtml("annual");placeholders();loadCatalog().catch(fallback);
